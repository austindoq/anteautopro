<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>🛹Admin Dashboard🛹</title>
  </head>
  <body
    class="h-screen flex flex-col justify-between bg-radial from-[#f1f3f5] from-30% to-slate-300"
  >
    <nav
      class="sticky top-0 z-100 flex flex-col md:flex-row md:justify-between font-bold text-[#e9ecef] tracking-widest md:tracking-wider bg-[#343a40] py-2 px-4 w-full border-b-2 border-b-[#e3173e]"
    >
      <div id="logo" class="flex justify-center md:justify-normal">
        <img src="/assets/images/anteautopro.ca.png" class="md:max-w-1/2" />
      </div>
      <div class="text-4xl bold italic flex justify-center">
        <h1>Ante's Admin Dashboard</h1>
      </div>
      <div
        id="nav-options"
        class="flex gap-4 md:gap-8 justify-evenly md:justify-normal"
      >
        <a
          href="/index.html"
          class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
          >Home <img src="/assets/icons/home.svg" class="size-7 mx-0.5"
        /></a>
        <a
          href="/blog.html"
          class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
          >Blog <img src="/assets/icons/car.svg" class="size-7 mx-0.5"
        /></a>
      </div>
    </nav>
    <main class="flex justify-center w-full">
      <section
        id="blogCreationSection"
        class="max-w-5xl border-1 border-[#343a40]"
      >
        <form id="createPostForm"></form>
      </section>
    </main>
    <footer
      class="bg-[url(/assets/images/anteautopro_footer_banner.png)] w-full flex justify-center border-t-2 border-t-[#1985b4]"
    >
      <div
        id="footer-inner"
        class="flex flex-col md:flex-row gap-2 md:gap-16 w-[95%] md:max-w-3/4 justify-center items-center py-4"
      >
        <div
          id="main-contacts"
          class="flex flex-col gap-2 text-[#e9ecef] tracking-wide"
        >
          <div id="email-group" class="flex gap-2 items-center justify-start">
            <img src="/assets/icons/contact.svg" class="size-10" />
            <span class="text-[#e3173e] text-5xl">•</span>
            <p id="contact-email" class="text-xl">anteautopro@gmail.com</p>
          </div>
          <div id="phone-group" class="flex gap-2 justify-start items-center">
            <img src="./assets/icons/phone.svg" class="size-10" />
            <span class="text-[#e3173e] text-5xl">•</span>
            <p id="contact-phone" class="text-xl">604-555-5555</p>
          </div>
        </div>
        <div
          id="alt-contacts"
          class="flex flex-col justify-center items-center gap-4"
        >
          <h1 class="text-2xl text-[#e9ecef] italic tracking-wide text-center">
            Connect another way:
          </h1>
          <div id="alt-contacts-links" class="flex gap-8">
            <a
              target="_blank"
              href="https://www.vancouverhonda.com/en"
              class="hover:cursor-pointer"
              ><img
                src="/assets/icons/honda-white.svg"
                class="h-[40px] scale-120"
            /></a>
            <a
              target="_blank"
              href="https://www.instagram.com/ante_auto_pro/"
              class="hover:cursor-pointer"
              ><img
                src="/assets/icons/instagram-white.svg"
                class="h-[40px] scale-120"
            /></a>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
