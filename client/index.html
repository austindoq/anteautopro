<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>AnteAutoPro.ca</title>
  </head>
  <!-- SPACING/PADDING -->
  <!-- SPACING:2 4 8 16 24 32 64- -->
  <!-- PADDING:2 4 8 16 24 32 64- -->
  <body class="bg-[#f1f3f5] font-[Jost]">
    <nav
      class="flex justify-between font-bold text-[#e9ecef] tracking-widest md:tracking-wider bg-[#343a40] py-2 px-2 md:px-4 w-full"
    >
      <img src="/assets/images/anteautopro.ca.png" class="max-w-1/3" />

      <a class="hover:cursor-pointer flex items-center"
        >Customer Tools
        <img src="/assets/icons/menu-alt-svgrepo-com.svg" class="size-5"
      /></a>
    </nav>
    <header
      id="hero"
      class="flex flex-col items-center md:h-[70vh] bg-radial md:bg-[url(/assets/images/temp_hero_image.jpg)] bg-cover from-[#f1f3f5] from-60% to-[#c5f6fa]"
    >
      <section id="hero-inner" class="w-[95%] md:w-5xl mt-10 mb-10">
        <div
          id="hero-super-duper-inner"
          class="flex flex-col justify-center gap-10"
        >
          <h1 class="text-5xl font-bold">
            I want to help <span class="bg-[#66d9e8] rounded-xl">you</span> find
            your drive
          </h1>
          <h2 class="text-2xl">
            Whether it's the daily commute, or a weekend cruise
          </h2>
          <div id="cta-buttons" class="flex flex-col gap-2">
            <button
              class="bg-[#3bc9db] w-[60%] rounded-lg shadow-2xl p-2 border-2 border-[#3bc9db] active:bg-[#f1f3f5] active:border-2 active:border-[#66d9e8] hover:cursor-pointer hover:bg-[#66d9e8] font-bold hover:scale-110 ease-in-out duration-150"
            >
              Book A 1-On-1
            </button>
            <button
              class="bg-[#3bc9db] w-[60%] rounded-lg shadow-2xl p-2 border-2 border-[#3bc9db] active:bg-[#f1f3f5] active:border-2 active:border-[#66d9e8] hover:cursor-pointer hover:bg-[#66d9e8] font-bold hover:scale-110 ease-in-out duration-150"
            >
              Book A Viewing
            </button>
          </div>
        </div>
      </section>
    </header>
    <section id="testimonials" class=""></section>
    <footer class="bg-[#343a40]">
      <div class="flex justify-center">
        <span class="text-xl font-semibold text-[#e9ecef] italic"
          >Connect another way:</span
        >
      </div>
      <div class="flex gap-4 justify-center">
        <a
          target="_blank"
          href="https://www.vancouverhonda.com/en"
          class="hover:cursor-pointer"
          ><img src="/assets/icons/honda-white.svg" class="h-[50px]"
        /></a>
        <a
          target="_blank"
          href="https://www.instagram.com/ante_auto_pro/"
          class="hover:cursor-pointer"
          ><img src="/assets/icons/instagram-white.svg" class="h-[50px]"
        /></a>
      </div>
    </footer>
  </body>
</html>
