<!doctype html>
<html lang="en">
  <head>

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Latest Honda News & Reviews | Ante Thompson | Vancouver Honda"

    />
    <meta
      property="og:image"
      content="https://anteautopro.ca/assets/images/og-image.png"
    />
    <meta property="og:url" content="https://anteautopro.ca/blog.html" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script defer src="/blog.js"></script>
    <title>Honda News & Reviews | Ante Thompson | Vancouver, BC</title>
    <meta
      name="description"
      content="Stay up to date on the latest Honda models, reviews, and automotive news from Ante Thompson, Honda sales consultant in Vancouver, BC."
    />

    <style>
      body {
        font-family: "Jost", "Trebuchet MS", Arial, sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col justify-between bg-radial from-[#f1f3f5] from-30% to-slate-300"
  >
    <nav
      class="sticky top-0 z-100 flex flex-col md:flex-row md:justify-between font-bold text-[#e9ecef] tracking-widest md:tracking-wider bg-[#343a40] py-2 px-0 md:px-8 w-full border-b-2 border-b-[#e3173e]"
    >
      <div id="logo" class="flex justify-center md:justify-normal">
        <img
          src="/assets/images/anteautopro.ca-logo2.png"
          class="w-128 md:w-64"
          alt="Vancouver Honda Sales Consultant Ante's Website Logo"
        />
      </div>
      <div
        id="nav-options"
        class="flex gap-2 md:gap-8 justify-evenly md:justify-normal"
      >
        <div
          id="nav-options-browse-types"
          class="flex text-center items-center justify-center text-2xl"
        >
          <a
            class="bg-[#e9ecef] text-[#1985b4] px-2 rounded-l-lg border-r-1 border-[#343a40] flex items-center hover:cursor-pointer"
            >Brand New</a
          >
          <a
            class="bg-[#e9ecef] text-[#e3173e] px-2 rounded-r-lg border-l-1 border-[#343a40] flex items-center hover:cursor-pointer"
            >Trade-Ins</a
          >
        </div>
        <div id="mobileNav" class="md:hidden relative">
          <button id="dropMenuButton" class="text-4xl ease-in-out duration-150">
            ≡
          </button>
          <div
            id="dropMenu"
            class="absolute hidden min-w-max -right-1 top-0 z-0 mt-12.5 flex flex-col gap-4 p-8 bg-[#343a40] rounded-b-lg border-b-1 border-l-1 border-r-1 border-[#e9ecef]"
          >
            <a
              href="/index.html"
              class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
            >
              <img src="/assets/icons/home.svg" class="size-7 mr-0.5" />Home</a
            >
            <div
              id="partition"
              class="h-[2px] w-full mx-auto bg-gradient-to-r from-transparent via-[#e9ecef] to-transparent"
            ></div>
            <a
              href="/blog.html"
              class="hover:cursor-pointer w-full flex items-center text-2xl text-[#e3173e]"
              ><img
                src="/assets/icons/car-selected.svg"
                class="size-7 mr-1"
              />Blog</a
            >
            <div
              id="partition"
              class="h-[2px] w-full mx-auto bg-gradient-to-r from-transparent via-[#e9ecef] to-transparent"
            ></div>
            <a
              href="/contact.html"
              class="hover:cursor-pointer w-full flex items-center text-2xl text-[#e9ecef]"
            >
              <img
                src="/assets/icons/contact.svg"
                class="size-7 -ml-0.5 mr-1"
              />Contact</a
            >
            <div
              id="partition"
              class="h-[2px] w-full mx-auto bg-gradient-to-r from-transparent via-[#e9ecef] to-transparent"
            ></div>
            <a
              href="/faq.html"
              class="hover:cursor-pointer w-full flex items-center text-2xl text-[#e9ecef]"
              ><img src="/assets/icons/about.svg" class="size-5 mr-2" />FAQ</a
            >
          </div>
        </div>
        <div id="desktopNav" class="hidden md:flex gap-8">
          <a
            href="/blog.html"
            class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
            >Blog <img src="/assets/icons/car.svg" class="size-7 mx-0.5"
          /></a>
          <a
            href="/contact.html"
            class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
            >Contact <img src="/assets/icons/contact.svg" class="size-7 mx-0.5"
          /></a>
          <a
            href="/faq.html"
            class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
            >FAQ <img src="/assets/icons/about.svg" class="size-5 mx-0.5"
          /></a>
        </div>
      </div>
    </nav>
    <main>
      <section id="blog-post-area" class="w-full flex justify-center mt-8">
        <div id="blog-post-area-inner" class="w-[95%] md:max-w-7xl">
          <h1
            id="section-header"
            class="text-5xl mb-4 font-bold underline decoration-[#1985b4] underline-offset-1"
          >
            Recent Blogs
          </h1>
          <div id="blogContentArea" class="flex flex-col gap-8 mb-15"></div>
        </div>
      </section>
    </main>
    <footer
      class="bg-[url(/assets/images/anteautopro_footer_banner.png)] bg-cover w-full flex justify-center border-t-2 border-t-[#1985b4]"
    >
      <div
        id="footer-inner"
        class="flex flex-col md:flex-row gap-2 md:gap-24 w-[95%] md:max-w-3/4 justify-center items-center py-4"
      >
        <div
          id="main-contacts"
          class="flex flex-col gap-2 text-[#e9ecef] tracking-wide"
        >
          <div id="email-group" class="flex gap-2 items-center justify-start">
            <img src="/assets/icons/contact.svg" class="size-10" />
            <span class="text-[#e3173e] text-5xl mt-2">•</span>
            <p id="contact-email" class="text-xl min-w-0 break-all">
              athompson@vancouverhonda.com
            </p>
          </div>
          <div id="phone-group" class="flex gap-2 justify-start items-center">
            <img src="./assets/icons/phone.svg" class="size-10" />
            <span class="text-[#e3173e] text-5xl mt-2">•</span>
            <p id="contact-phone" class="text-xl">236-979-4947</p>
          </div>
        </div>
        <div
          id="alt-contacts"
          class="flex flex-col justify-center items-center gap-4"
        >
          <h1 class="text-2xl text-[#e9ecef] italic tracking-wide text-center">
            Connect another way:
          </h1>
          <div id="alt-contacts-links" class="flex gap-8">
            <a
              target="_blank"
              href="https://www.vancouverhonda.com/en"
              class="hover:cursor-pointer"
              ><img
                src="/assets/icons/honda-white.svg"
                class="h-[40px] scale-120"
            /></a>
            <a
              target="_blank"
              href="https://www.instagram.com/ante_auto_pro/"
              class="hover:cursor-pointer"
              ><img
                src="/assets/icons/instagram-white.svg"
                class="h-[40px] scale-120"
            /></a>
          </div>
        </div>
      </div>
    </footer>

</html>
