<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://anteautopro.ca/contact.html" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Contact Ante Thompson | Vancouver Honda Sales"
    />
    <meta
      property="og:description"
      content="Get in touch with Ante Thompson, Honda sales consultant in Vancouver, BC. Book a 1-on-1 consultation or free vehicle appraisal today."
    />
    <meta
      property="og:image"
      content="https://anteautopro.ca/assets/images/ante-portrait.jpg"
    />
    <meta property="og:url" content="https://anteautopro.ca/contact.html" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Contact | Ante Thompson | Vancouver, BC</title>
    <meta
      name="description"
      content="Get in touch with Ante Thompson, Honda sales consultant in Vancouver, BC. Book a 1-on-1 consultation or free vehicle appraisal today."
    />
    <style>
      body {
        font-family: "Jost", "Trebuchet MS", Arial, sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col justify-between bg-radial from-[#f1f3f5] from-30% to-slate-300"
  >
    <nav
      class="sticky top-0 z-100 flex flex-col md:flex-row md:justify-between font-bold text-[#e9ecef] tracking-widest md:tracking-wider bg-[#343a40] py-2 px-4 md:px-8 w-full border-b-2 border-b-[#e3173e]"
    >
      <div id="logo" class="md:max-w-1/3 flex justify-center md:justify-normal">
        <a href="/index.html" class="hover:cursor-pointer w-fit">
          <img
            src="/assets/images/anteautopro.ca-logo2.png"
            class="w-128 md:w-64"
          />
        </a>
      </div>

      <div
        id="nav-options"
        class="flex gap-2 md:gap-8 justify-evenly md:justify-normal md:mr-2"
      >
        <a
          href="/index.html"
          class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
          >Home
          <img
            src="/assets/icons/home.svg"
            class="hidden md:inline-block size-7 mx-0.5"
        /></a>
        <a
          href="/blog.html"
          class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
          >Blog
          <img
            src="/assets/icons/car.svg"
            class="hidden md:inline-block size-7 mx-0.5"
        /></a>
        <a
          class="hover:cursor-pointer flex items-center text-2xl italic font-extrabold text-[#e3173e]"
          >Contact
          <img
            src="/assets/icons/contact-selected.svg"
            class="hidden md:inline-block size-7 mx-0.5"
        /></a>
        <a
          href="/faq.html"
          class="hover:cursor-pointer flex items-center text-2xl text-[#e9ecef]"
          >FAQ
          <img
            src="/assets/icons/about.svg"
            class="hidden md:inline-block size-5 mx-0.5"
        /></a>
      </div>
    </nav>
    <main>
      <section id="contact-area" class="w-full flex justify-center my-8">
        <div id="contact-area-inner" class="w-[95%] md:max-w-4xl">
          <h1
            id="section-header"
            class="text-5xl mb-4 font-bold underline decoration-[#1985b4] underline-offset-1"
          >
            Contact
          </h1>
          <div
            id="contact-card"
            class="bg-[#343a40] p-4 rounded-lg shadow-xl text-[#e9ecef] text-3xl flex flex-col gap-4"
          >
            <div
              id="dealership-info"
              class="flex flex-col gap-4 text-center w-full"
            >
              <h1 class="font-semibold italic">
                Come by and say hello in person!
              </h1>
              <div
                id="location-info"
                class="flex flex-col md:flex-row justify-center items-center text-lg md:text-xl text-center md:"
              >
                <a
                  href="https://www.google.com/maps/place/850+SW+Marine+Dr,+Vancouver,+BC+V6P+5Z1/@49.2056565,-123.1293107,1136m"
                  target="_blank"
                  class="hover:cursor-pointer underline italic flex items-center"
                >
                  <img src="/assets/icons/pin-white.svg" class="size-6" />
                  <p>
                    850 Southwest Marine Drive, Vancouver, British Columbia, V6P
                    5Z1
                  </p>
                </a>
              </div>
              <img
                src="/assets/images/vancouver_honda_dealership.jpg"
                class="rounded-lg"
              />
            </div>
            <div
              id="contacts"
              class="flex flex-col justify-center w-full gap-4 md:gap-8"
            >
              <div
                id="main-contacts"
                class="flex flex-col md:grid md:grid-cols-2 md:grid-rows-2 gap-2 text-[#e9ecef] md:items-center tracking-wide"
              >
                <div id="schedule" class="row-span-2 text-2xl text-center">
                  <p>
                    Reach out to me by email or phone 9:00am - 8:00pm 7 days a
                    week!
                  </p>
                </div>
                <div
                  id="email-group"
                  class="flex gap-2 col-span-1 col-start-2 row-start-2 items-center justify-center md:justify-start"
                >
                  <img src="/assets/icons/contact.svg" class="size-10" />
                  <span class="text-[#e3173e] text-5xl mt-2">•</span>
                  <p id="contact-email" class="text-xl min-w-0 break-all">
                    athompson@vancouverhonda.com
                  </p>
                </div>
                <div
                  id="phone-group"
                  class="flex gap-2 justify-center md:justify-start col-span-1 col-start-2 row-start-1 items-center"
                >
                  <img src="./assets/icons/phone.svg" class="size-10" />
                  <span class="text-[#e3173e] text-5xl mt-2">•</span>
                  <p id="contact-phone" class="text-xl">236-979-4947</p>
                </div>
              </div>
              <div
                id="alt-contacts"
                class="flex flex-col justify-center items-center gap-4"
              >
                <h1
                  class="text-2xl text-[#e9ecef] italic tracking-wide text-center"
                >
                  Connect another way:
                </h1>
                <div id="alt-contacts-links" class="flex gap-8">
                  <a
                    target="_blank"
                    href="https://www.vancouverhonda.com/en"
                    class="hover:cursor-pointer"
                    ><img
                      src="/assets/icons/honda-white.svg"
                      class="h-[40px] scale-120"
                  /></a>
                  <a
                    target="_blank"
                    href="https://www.instagram.com/ante_auto_pro/"
                    class="hover:cursor-pointer"
                    ><img
                      src="/assets/icons/instagram-white.svg"
                      class="h-[40px] scale-120"
                  /></a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer
      class="bg-[url(/assets/images/anteautopro_footer_banner.png)] bg-cover w-full flex justify-center border-t-2 border-t-[#1985b4]"
    >
      <div
        id="footer-inner"
        class="flex flex-col md:flex-row gap-2 md:gap-24 w-[95%] md:max-w-3/4 justify-center items-center py-4"
      ></div>
    </footer>
  </body>
</html>
